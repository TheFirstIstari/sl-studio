name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Frontend: Lint, Type Check, Build (runs once, artifact shared)
  # ============================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: build
          retention-days: 1

  # ============================================================
  # Rust: Format, Clippy, Build (all platforms in parallel)
  # ============================================================
  rust:
    name: Rust (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub-hosted runners
          - platform: Linux
            runs-on: ubuntu-22.04
            install-deps: true
          - platform: macOS
            runs-on: macos-latest
            install-deps: false
          - platform: Windows
            runs-on: windows-latest
            install-deps: false
          # Self-hosted runners (Fedora/NixOS on your minipc)
          - platform: Fedora
            runs-on: [self-hosted, fedora]
            install-deps: true
            use-mise: true
          - platform: NixOS
            runs-on: [self-hosted, nixos]
            install-deps: true
            use-mise: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: matrix.install-deps
        run: |
          bash scripts/install_deps.sh

      - name: Setup Rust
        if: '!matrix.use-mise'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Cache cargo
        if: '!matrix.use-mise'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust CI (self-hosted with mise)
        if: matrix.use-mise
        shell: bash
        run: |
          set -euo pipefail
          if command -v mise >/dev/null 2>&1; then
            mise run ci_rust
          else
            echo "mise not found, running fallback checks..."
            (cd src-tauri && cargo fmt --check)
            (cd src-tauri && cargo clippy -- -D warnings)
            (cd src-tauri && cargo build --release)
          fi

      - name: Rust CI (GitHub-hosted)
        if: '!matrix.use-mise'
        shell: bash
        run: |
          set -euo pipefail
          cd src-tauri
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo build --release

  # ============================================================
  # Tests (runs on Linux + self-hosted runners)
  # ============================================================
  tests:
    name: Tests (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            runs-on: ubuntu-22.04
            install-deps: true
            use-mise: false
          - platform: Fedora
            runs-on: [self-hosted, fedora]
            install-deps: false
            use-mise: true
          - platform: NixOS
            runs-on: [self-hosted, nixos]
            install-deps: false
            use-mise: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: matrix.install-deps
        run: |
          bash scripts/install_deps.sh

      - name: Setup Rust
        if: '!matrix.use-mise'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Cache cargo
        if: '!matrix.use-mise'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests (self-hosted with mise)
        if: matrix.use-mise
        shell: bash
        run: |
          set -euo pipefail
          if command -v mise >/dev/null 2>&1; then
            mise run ci_test
          else
            echo "mise not found, running cargo test directly..."
            cd src-tauri && cargo test
          fi

      - name: Run tests (GitHub-hosted)
        if: '!matrix.use-mise'
        working-directory: src-tauri
        run: cargo test

  # ============================================================
  # Build: Create Tauri app (all platforms)
  # ============================================================
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    needs: [rust, tests]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            runs-on: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            install-deps: true
          - platform: macOS ARM
            runs-on: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
            install-deps: false
          - platform: macOS Intel
            runs-on: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg,app
            install-deps: false
          - platform: Windows
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,exe
            install-deps: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: matrix.install-deps
        run: |
          bash scripts/install_deps.sh

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: ignore

  # ============================================================
  # Release: Create GitHub release with all artifacts
  # ============================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup release artifacts
        run: |
          if [ -x scripts/cleanup_release.sh ]; then
            bash scripts/cleanup_release.sh
          else
            echo "cleanup_release.sh not found, skipping cleanup"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/tauri-*/**/*.dmg
            artifacts/tauri-*/**/*.app/**
            artifacts/tauri-*/**/*.deb
            artifacts/tauri-*/**/*.AppImage
            artifacts/tauri-*/**/*.msi
            artifacts/tauri-*/**/*.exe
