name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Shared: Frontend (runs once, artifact shared across platforms)
  # ============================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: build
          retention-days: 1

  # ============================================================
  # Linux Pipeline
  # ============================================================
  rust-linux:
    name: Rust (Linux)
    needs: frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Rust CI
        run: |
          set -euo pipefail
          cd src-tauri
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo build --release

  tests-linux:
    name: Tests (Linux)
    needs: frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  build-linux:
    name: Build (Linux)
    needs: [frontend, rust-linux, tests-linux]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target x86_64-unknown-linux-gnu --bundles deb,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-x86_64-unknown-linux-gnu
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.{deb,AppImage}
          if-no-files-found: ignore

  # ============================================================
  # macOS ARM Pipeline
  # ============================================================
  rust-macos-arm:
    name: Rust (macOS ARM)
    needs: frontend
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust CI
        run: |
          set -euo pipefail
          cd src-tauri
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo build --release

  tests-macos-arm:
    name: Tests (macOS ARM)
    needs: frontend
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  build-macos-arm:
    name: Build (macOS ARM)
    needs: [frontend, rust-macos-arm, tests-macos-arm]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin --bundles dmg,app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-aarch64-apple-darwin
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.{dmg,app}
          if-no-files-found: ignore

  # ============================================================
  # macOS Intel Pipeline
  # ============================================================
  rust-macos-intel:
    name: Rust (macOS Intel)
    needs: frontend
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust CI
        run: |
          set -euo pipefail
          cd src-tauri
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo build --release

  tests-macos-intel:
    name: Tests (macOS Intel)
    needs: frontend
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  build-macos-intel:
    name: Build (macOS Intel)
    needs: [frontend, rust-macos-intel, tests-macos-intel]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target x86_64-apple-darwin --bundles dmg,app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-x86_64-apple-darwin
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.{dmg,app}
          if-no-files-found: ignore

  # ============================================================
  # Windows Pipeline
  # ============================================================
  rust-windows:
    name: Rust (Windows)
    needs: frontend
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust CI
        run: |
          Set-Location src-tauri
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo build --release

  tests-windows:
    name: Tests (Windows)
    needs: frontend
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  build-windows:
    name: Build (Windows)
    needs: [frontend, rust-windows, tests-windows]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc --bundles msi,exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-x86_64-pc-windows-msvc
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.{msi,exe}
          if-no-files-found: ignore

  # ============================================================
  # Fedora Pipeline (Self-hosted, rust + tests only)
  # ============================================================
  rust-fedora:
    name: Rust (Fedora)
    needs: frontend
    runs-on: [self-hosted, fedora]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Rust CI (mise)
        shell: bash
        run: |
          set -euo pipefail
          if command -v mise >/dev/null 2>&1; then
            mise run ci_rust
          else
            echo "mise not found, running fallback checks..."
            (cd src-tauri && cargo fmt --check)
            (cd src-tauri && cargo clippy -- -D warnings)
            (cd src-tauri && cargo build --release)
          fi

  tests-fedora:
    name: Tests (Fedora)
    needs: frontend
    runs-on: [self-hosted, fedora]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Run tests (mise)
        shell: bash
        run: |
          set -euo pipefail
          if command -v mise >/dev/null 2>&1; then
            mise run ci_test
          else
            echo "mise not found, running cargo test directly..."
            cd src-tauri && cargo test
          fi

  # ============================================================
  # NixOS Pipeline (Self-hosted, rust + tests only)
  # ============================================================
  rust-nixos:
    name: Rust (NixOS)
    needs: frontend
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Rust CI (mise)
        shell: bash
        run: |
          set -euo pipefail
          if command -v mise >/dev/null 2>&1; then
            mise run ci_rust
          else
            echo "mise not found, running fallback checks..."
            (cd src-tauri && cargo fmt --check)
            (cd src-tauri && cargo clippy -- -D warnings)
            (cd src-tauri && cargo build --release)
          fi

  tests-nixos:
    name: Tests (NixOS)
    needs: frontend
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: build

      - name: Run tests (mise)
        shell: bash
        run: |
          set -euo pipefail
          if command -v mise >/dev/null 2>&1; then
            mise run ci_test
          else
            echo "mise not found, running cargo test directly..."
            cd src-tauri && cargo test
          fi

  # ============================================================
  # Release: Create GitHub release with all artifacts
  # ============================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos-arm, build-macos-intel, build-windows]
    if: always() && !cancelled() && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup release artifacts
        run: |
          if [ -x scripts/cleanup_release.sh ]; then
            bash scripts/cleanup_release.sh
          else
            echo "cleanup_release.sh not found, skipping cleanup"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/tauri-*/**/*.dmg
            artifacts/tauri-*/**/*.app/**
            artifacts/tauri-*/**/*.deb
            artifacts/tauri-*/**/*.AppImage
            artifacts/tauri-*/**/*.msi
            artifacts/tauri-*/**/*.exe
