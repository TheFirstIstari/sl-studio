[env]
RUSTUP_HOME = "~/.rustup"
LIBS = "/opt/homebrew/lib"

[tools]
node = "22"
rust = "stable"

# ============================================================
# Core Commands
# ============================================================


[tasks.ci_rust]
description = "Run Rust CI (fmt, build - clippy warnings allowed)"
run = [
    "cd src-tauri && cargo fmt --check",
    "cd src-tauri && cargo build --release 2>&1 | tail -5",
]

[tasks.ci_test]
description = "Run Rust tests" 
run = "cd src-tauri && cargo test"

[tasks.run]
description = "Run full CI pipeline - matches .github/workflows/ci.yml"
alias = ["ci", "check"]
run = [
    # Frontend checks (from CI workflow frontend job)
    "mise run format",
    "mise run lint_types", 
    "npm run build",
    # Rust checks (from CI workflow rust-* jobs)
    "mise run ci_rust", 
    # Tests (from CI workflow tests-* jobs)
    "mise run ci_test",
]

[tasks.test]
description = "Run TypeScript + E2E tests (requires tauri dev running for E2E)"
run = [
    "echo 'Running frontend type checks...'",
    "npm run check",
    "echo 'Running E2E tests (requires: npm run tauri dev in separate terminal)...'",
    "npx playwright test",
]

[tasks.build]
description = "Build the application"
run = "npm run tauri build"

[tasks.dev]
description = "Start development server"
run = "npm run tauri dev"

# ============================================================
# Pre-commit / Pre-push
# ============================================================

[tasks.precommit]
description = "Quick validation before committing"
alias = ["pc"]
run = [
    "mise run format",
    "mise run lint_types",
]

[tasks.prepush]
description = "Full validation before pushing"
alias = ["push"]
run = [
    "mise run run",
]

# ============================================================
# Individual checks
# ============================================================

[tasks.format]
description = "Check formatting (prettier + rustfmt)"
run = [
    "npm run format:check",
    "cd src-tauri && cargo fmt --check",
]

[tasks.format_fix]
description = "Auto-fix formatting"
run = [
    "npm run format",
    "cd src-tauri && cargo fmt",
]

[tasks.lint]
description = "Run linting checks"
run = [
    "mise run lint_types",
    "mise run lint_clippy",
]

[tasks.lint_types]
description = "Run type and lint checks"
run = [
    "npm run check",
    "npm run lint",
]

[tasks.lint_clippy]
description = "Run Rust clippy"
run = "cd src-tauri && cargo clippy -- -D warnings"

# ============================================================
# Individual test commands
# ============================================================

[tasks.test_rust]
description = "Run Rust tests only"
run = "cd src-tauri && cargo test"

[tasks.test_e2e]
description = "Run Playwright E2E tests"
run = "npx playwright test --project=chromium --project=firefox --project=webkit"

[tasks.test_types]
description = "Run TypeScript checks"
run = "npm run check"

# ============================================================
# Build variants
# ============================================================

[tasks.release]
description = "Create production release"
run = "npm run tauri build"

[tasks.release_macos]
description = "Build macOS app bundle"
run = "npm run tauri build -- --bundles app"

# ============================================================
# Setup and utilities
# ============================================================

[tasks.setup]
description = "Initial project setup"
run = [
    "cargo fetch --manifest-path src-tauri/Cargo.toml",
    "npm install",
]

[tasks.clean]
description = "Clean build artifacts"
run = [
    "rm -rf src-tauri/target/release/build",
    "rm -rf .svelte-kit",
    "rm -rf build",
]

[tasks.open]
description = "Open built application"
run = "open src-tauri/target/release/SL Studio.app"

[settings]
jobs = 4
http_timeout = "60s"
